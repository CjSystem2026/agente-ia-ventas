version: '3.8'

services:
  # Base de Datos PostgreSQL para Evolution API
  postgres:
    image: postgres:15-alpine
    container_name: agent_postgres
    restart: always
    environment:
      POSTGRES_DB: evolution_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: evolutionpassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agent_network

  # Cache Redis para Evolution API
  redis:
    image: redis:7-alpine
    container_name: agent_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agent_network

  # Evolution API (WhatsApp API Core)
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: agent_evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_URL=http://evolution-api:8080
      - SERVER_TYPE=http
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=super_secure_key_999888
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:evolutionpassword123@postgres:5432/evolution_db
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_MESSAGES=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_SAVE_STATUS_INSTANCE=true
      # Webhooks globales - le diremos que envíe a nuestro backend
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://agent-backend:8000/webhook/evolution
      - WEBHOOK_GLOBAL_BASE64=true
      - WEBHOOK_GLOBAL_BY_EVENTS=true
      - WEBHOOK_EVENTS_ERRORS=false
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=false
      - WEBHOOK_EVENTS_MESSAGES_DELETE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=false
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=false
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=false
      - WEBHOOK_EVENTS_PRESENCE_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_UPSERT=false
      - WEBHOOK_EVENTS_CHATS_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_DELETE=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPDATE=false
      - WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE=false
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_CALL=false
    depends_on:
      - postgres
      - redis
    networks:
      - agent_network

  # Backend y Dashboard del Agente de Ventas (FastAPI)
  agent-backend:
    build: .
    container_name: agent_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=super_secure_key_999888
      - EVOLUTION_INSTANCE_NAME=BingoBot
      - BACKEND_URL=http://agent-backend:8000
      - BINGO_API_URL=${BINGO_API_URL}
    volumes:
      - ./data:/app/data
      - .:/app
    depends_on:
      - evolution-api
    networks:
      - agent_network

networks:
  agent_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
